name: Automated Release Distribution

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ${{ matrix.os }}
    environment: release
    strategy:
      matrix:
        include:
          # Windows Releases
          - os: windows-latest
            platform: win-x64
            target: x86_64-pc-windows-msvc
            exe_name: media-sort-gui.exe
            mpv_arch: x86_64
            vcredist: vcredist143-x64
          - os: windows-latest
            platform: win-x86
            target: i686-pc-windows-msvc
            exe_name: media-sort-gui.exe
            mpv_arch: i686
            vcredist: vcredist143-x86
          - os: windows-11-arm
            platform: win-arm64
            target: aarch64-pc-windows-msvc
            exe_name: media-sort-gui.exe
            mpv_arch: aarch64
            vcredist: vcredist143-arm64

          # Linux Releases
          - os: ubuntu-24.04
            platform: linux-x64
            target: x86_64-unknown-linux-gnu
            exe_name: media-sort-gui
          - os: ubuntu-24.04-arm
            platform: linux-arm64
            target: aarch64-unknown-linux-gnu
            exe_name: media-sort-gui

          # macOS Releases
          - os: macos-latest
            platform: osx-arm64
            target: aarch64-apple-darwin
            exe_name: media-sort-gui
            brew_prefix: /opt/homebrew

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v7

      - name: Setup Rust Environment
        uses: dtolnay/rust-toolchain@stable

      - name: Setup .NET SDK (For vpk CLI)
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Install System Dependencies (Linux Only)
        if: startsWith(matrix.os, 'ubuntu')
        run: sudo apt-get update && sudo apt-get install -y libmpv-dev libasound2-dev squashfs-tools

      - name: Install System Dependencies (macOS Only)
        if: startsWith(matrix.os, 'macos')
        run: brew install mpv dylibbundler

      - name: Setup libmpv Link Libraries (Windows)
        if: startsWith(matrix.os, 'windows')
        shell: bash
        run: |
          mkdir -p libs
          curl -L -o mpv-dev.7z https://github.com/shinchiro/mpv-winbuild-cmake/releases/download/20260610/mpv-dev-${{ matrix.mpv_arch }}-20260610-git-304426c.7z
          7z e mpv-dev.7z libmpv-2.dll -olibs -y
          7z e mpv-dev.7z libmpv.dll.a -olibs -y
          mv libs/libmpv.dll.a libs/mpv.lib

      - name: Build Standalone Binary
        env:
          LIBRARY_PATH: ${{ startsWith(matrix.os, 'macos') && format('{0}/lib', matrix.brew_prefix) || '' }}
          LIB: ${{ startsWith(matrix.os, 'windows') && 'libs' || '' }}
          RUSTFLAGS: ${{ startsWith(matrix.os, 'windows') && '-L native=libs' || '' }}
        run: |
          rustup target add ${{ matrix.target }}
          cargo build --release --target ${{ matrix.target }} -p media-sort-gui --features velopack

      - name: Install and Run Velopack Packager
        shell: bash
        run: |
          dotnet tool install -g vpk
          export PATH="$PATH:$HOME/.dotnet/tools"
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

          RAW_VERSION="${{ github.ref_name }}"
          CLEAN_VERSION="${RAW_VERSION#v}"

          DOWNLOAD_FLAGS=""
          if [[ "$RAW_VERSION" == *"-"* ]]; then
            DOWNLOAD_FLAGS="--pre"
          fi

          vpk download github --repoUrl https://github.com/${{ github.repository }} --channel ${{ matrix.platform }} --token ${{ secrets.GITHUB_TOKEN }} $DOWNLOAD_FLAGS

          TARGET_DIR="target/${{ matrix.target }}/release"
          mkdir dist

          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            mkdir -p "dist/Media Sort.app/Contents/MacOS"
            mkdir -p "dist/Media Sort.app/Contents/Resources"
            cp "$TARGET_DIR/media-sort-gui" "dist/Media Sort.app/Contents/MacOS/"
            cp packaging/macos/Info.plist "dist/Media Sort.app/Contents/"
            cp packaging/macos/icon.icns "dist/Media Sort.app/Contents/Resources/"

            dylibbundler -od -b -x "dist/Media Sort.app/Contents/MacOS/media-sort-gui" -d "dist/Media Sort.app/Contents/libs/" -s ${{ matrix.brew_prefix }}/lib

            vpk pack -u MediaSort -v "$CLEAN_VERSION" -p "dist/Media Sort.app" --mainExe media-sort-gui --icon "packaging/macos/icon.icns" --channel ${{ matrix.platform }} --runtime ${{ matrix.platform }}
          elif [ "${{ matrix.os }}" = "windows-latest" ] || [ "${{ matrix.os }}" = "windows-11-arm" ]; then
            cp "$TARGET_DIR/media-sort-gui.exe" dist/
            cp libs/libmpv-2.dll dist/
            cp packaging/windows/icon.ico dist/

            vpk pack -u MediaSort -v "$CLEAN_VERSION" -p dist -e ${{ matrix.exe_name }} --icon "dist/icon.ico" --channel ${{ matrix.platform }} --runtime ${{ matrix.platform }} --framework ${{ matrix.vcredist }}
          else
            # Stage only the compiled binary to prevent bundling Cargo build cache
            mkdir -p dist/linux-staging
            cp "$TARGET_DIR/media-sort-gui" dist/linux-staging/

            # Generate initial layout with default update manifests
            vpk pack -u MediaSort -v "$CLEAN_VERSION" -p "dist/linux-staging" -e media-sort-gui --icon "Image Sort.svg" --channel ${{ matrix.platform }} --runtime ${{ matrix.platform }}

            # Unpack the intermediate AppImage artifact
            APPIMAGE_PATH=$(ls Releases/*.AppImage | head -n 1)
            chmod +x "$APPIMAGE_PATH"
            "$APPIMAGE_PATH" --appimage-extract
            
            # Purge baseline outputs to prevent circular duplication
            rm -f Releases/*.AppImage
            rm -f Releases/*.nupkg

            # Surgically modify vpk-generated desktop file (preserves vendor metadata)
            TARGET_DESKTOP="squashfs-root/MediaSort.desktop"
            sed -i 's/^Name=.*/Name=Media Sort/' "$TARGET_DESKTOP"
            sed -i 's/^Exec=.*/& %U/' "$TARGET_DESKTOP"
            sed -i 's/^StartupWMClass=.*/StartupWMClass=MediaSort/' "$TARGET_DESKTOP"
            printf '\n%s\n' "MimeType=inode/directory;" >> "$TARGET_DESKTOP"

            # Mirror adjusted launcher to standard layout paths
            mkdir -p squashfs-root/usr/share/applications
            cp "$TARGET_DESKTOP" squashfs-root/usr/share/applications/MediaSort.desktop

            # Re-stage into a clean AppDir context and execute final compilation
            rm -rf dist
            mkdir -p dist
            mv squashfs-root dist/MediaSort.AppDir

            vpk pack -u MediaSort -v "$CLEAN_VERSION" -p "dist/MediaSort.AppDir" -e media-sort-gui --channel ${{ matrix.platform }} --runtime ${{ matrix.platform }}
          fi

      - name: Ensure GnuPG is installed
        if: success()
        shell: bash
        run: |
          if ! command -v gpg &> /dev/null; then
            echo "gpg not found. Installing..."
            if [ "${{ matrix.os }}" = "macos-latest" ]; then
              brew install gnupg
            elif [ "${{ matrix.os }}" = "windows-latest" ] || [ "${{ matrix.os }}" = "windows-11-arm" ]; then
              choco install -y gnupg
            else
              sudo apt-get update && sudo apt-get install -y gnupg
            fi
          else
            echo "gpg is already installed: $(gpg --version | head -n 1)"
          fi

      - name: Import GPG Key
        if: success()
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Sign Velopack Packages
        if: success()
        shell: bash
        run: |
          for file in Releases/*.nupkg; do
            echo "Signing $file..."
            gpg --batch --yes --pinentry-mode loopback \
                --passphrase "${{ secrets.GPG_PASSPHRASE }}" \
                --detach-sign \
                --output "${file}.sig" \
                "$file"
          done

      - name: Upload Velopack Packages to GitHub Draft Release
        if: success()
        shell: bash
        run: |
          RAW_VERSION="${{ github.ref_name }}"
          vpk upload github --repoUrl https://github.com/${{ github.repository }} --channel ${{ matrix.platform }} --merge --tag "$RAW_VERSION" --token ${{ secrets.GITHUB_TOKEN }}

      - name: Upload GPG signatures to GitHub Draft Release
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" Releases/*.sig --clobber

  publish:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Extract Tag Message
        run: |
          TAG_TEXT=$(git tag -l --format='%(contents)' ${{ github.ref_name }})
          if [ ! -z "$TAG_TEXT" ]; then
            echo "$TAG_TEXT" > CHANGES.md
            echo -e "\n\n## Changelog" >> CHANGES.md
          else
            touch CHANGES.md
          fi

      - name: Generate Changelog from Commits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Download and extract the git-cliff binary
          curl -L -o git-cliff.tar.gz https://github.com/orhun/git-cliff/releases/download/v2.13.1/git-cliff-2.13.1-x86_64-unknown-linux-gnu.tar.gz
          tar -xzf git-cliff.tar.gz --strip-components=1
          
          # Execute git-cliff directly
          ./git-cliff --config cliff.toml --current --strip header --prepend CHANGES.md

      - name: Publish Release Atomically
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "All platforms compiled, signed, and merged. Publishing release..."
          RAW_VERSION="${{ github.ref_name }}"
          if [[ "$RAW_VERSION" == *"-"* ]]; then
            echo "Pre-release version detected. Publishing as pre-release..."
            gh release edit "$RAW_VERSION" --draft=false --prerelease --notes-file CHANGES.md
          else
            echo "Stable version detected. Publishing as stable release..."
            gh release edit "$RAW_VERSION" --draft=false --prerelease=false --latest --notes-file CHANGES.md
          fi
