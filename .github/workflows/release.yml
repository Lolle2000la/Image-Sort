name: Automated Release Distribution

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            exe_name: media-sort-gui
          - os: windows-latest
            platform: win
            exe_name: media-sort-gui.exe
          - os: macos-latest
            platform: osx
            exe_name: media-sort-gui

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Rust Environment
        uses: dtolnay/rust-toolchain@stable

      - name: Setup .NET SDK (For vpk CLI)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install System Dependencies (Linux Only)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libmpv-dev

      - name: Install System Dependencies (macOS Only)
        if: matrix.os == 'macos-latest'
        run: brew install mpv macdylibbundler

      - name: Build Standalone Binary
        run: cargo build --release

      - name: Bundle libmpv (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          curl -L -o mpv-dev.7z https://github.com/shinchiro/mpv-winbuild-cmake/releases/download/20260610/mpv-dev-x86_64-20260610-git-304426c.7z
          7z e mpv-dev.7z mpv-1.dll -otarget/release/ -y

      - name: Bundle macOS Dynamic Libraries & App Structure
        if: matrix.os == 'macos-latest'
        run: |
          # 1. Structure the canonical macOS App Bundle hierarchy
          mkdir -p "target/release/Media Sort.app/Contents/MacOS"
          mv target/release/media-sort-gui "target/release/Media Sort.app/Contents/MacOS/"

          # 2. Trace, clone, and deeply link dylibs via dylibbundler natively
          dylibbundler -od -b -x "target/release/Media Sort.app/Contents/MacOS/media-sort-gui" -d "target/release/Media Sort.app/Contents/MacOS/" -s /opt/homebrew/lib

      - name: Install and Run Velopack Packager
        shell: bash
        run: |
          dotnet tool install -g vpk

          # Strip leading 'v' from tag for vpk version parsing
          RAW_VERSION="${{ github.ref_name }}"
          CLEAN_VERSION="${RAW_VERSION#v}"

          vpk download github --repoUrl https://github.com/${{ github.repository }} --channel ${{ matrix.platform }} --token ${{ secrets.GITHUB_TOKEN }} --allowMissing

          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            vpk pack -u ImageSort -v "$CLEAN_VERSION" -p target/release -e "Media Sort.app" --channel ${{ matrix.platform }}
          else
            vpk pack -u ImageSort -v "$CLEAN_VERSION" -p target/release -e ${{ matrix.exe_name }} --channel ${{ matrix.platform }}
          fi

          vpk upload github --repoUrl https://github.com/${{ github.repository }} --publish --token ${{ secrets.GITHUB_TOKEN }}
