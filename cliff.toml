[changelog]
header = """
"""
body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}
* {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message | upper_first }} ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/{{- remote.github.owner -}}/{{- remote.github.repo -}}/commit/{{ commit.id }}))\
{% endfor %}
{% endfor %}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
    { message = "^feat", group = "🚀 Features" },
    { message = "^fix", group = "🐛 Bug Fixes" },
    { message = "^perf", group = "⚡ Performance Improvements" },
    { message = "^refactor", group = "🚜 Refactoring" },
    { message = "^test", group = "🧪 Testing" },
    { message = "^style", group = "🎨 Code Style & Quality" },
    { message = "^chore", group = "⚙️ Maintenance" },
    { message = ".*", drop = true }
]
filter_commits = false
tag_pattern = "v[0-9]*"
