repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        description: Format staged Rust files
        entry: cargo fmt --all --
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        description: Fix clippy lints on staged Rust files
        entry: cargo clippy --fix --allow-dirty --allow-staged --all-targets -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

      - id: website-format
        name: website format
        description: Format website files in-place
        entry: npm --prefix website run format
        language: system
        files: ^website/
        pass_filenames: false

      - id: website-lint
        name: website lint
        description: Check website files for lint issues
        entry: npm --prefix website run lint
        language: system
        files: ^website/
        pass_filenames: false
